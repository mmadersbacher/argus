services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    volumes:
      # postgres:18+ stores data in a major-version subdir; mount the parent,
      # not /data (the old convention), or the container refuses to start.
      - argus-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://argus:argus@postgres:5432/argus
      ARGUS_BIND: 0.0.0.0:8088
      RUST_LOG: info
      # REQUIRED for real deployments: 32+ char secret; without it sessions
      # are invalidated on every restart (ephemeral dev secret).
      ARGUS_JWT_SECRET: ${ARGUS_JWT_SECRET:-}
      # Browser origin(s) allowed to call the API (comma-separated).
      ARGUS_CORS_ORIGIN: ${ARGUS_CORS_ORIGIN:-http://localhost:3000}
      # First-run bootstrap admin. Without a password, one is generated and
      # printed once in this container's log.
      ARGUS_ADMIN_EMAIL: ${ARGUS_ADMIN_EMAIL:-admin@argus.local}
      ARGUS_ADMIN_PASSWORD: ${ARGUS_ADMIN_PASSWORD:-}
      # Self-service tenant signup (`true`/`false`) and demo seeding.
      ARGUS_SIGNUP_ENABLED: ${ARGUS_SIGNUP_ENABLED:-true}
      ARGUS_SEED_DEMO: ${ARGUS_SEED_DEMO:-true}
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8088
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  argus-pgdata:
