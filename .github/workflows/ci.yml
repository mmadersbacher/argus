name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argus -d argus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # TEST_DATABASE_URL turns on the gated Postgres integration tests in
      # argus-api; without it (e.g. local runs) those tests self-skip.
      - run: cargo test --workspace
        env:
          TEST_DATABASE_URL: postgresql://argus:argus@localhost:5432/argus

  web:
    name: Web (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      # The vitest suite (web/src/**/__tests__) ran locally but never gated CI —
      # a broken component test used to pass the pipeline. `npm test` = vitest run.
      - run: npm test
      - run: npm run build

  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # An exposure-management product must scan its own supply chain against the
      # RustSec advisory DB. Fails CI on a known-vulnerable dependency.
      - run: cargo install cargo-audit --locked
      # RUSTSEC-2023-0071 (rsa Marvin timing side-channel, no fix available) is
      # ignored: `rsa` is pulled only by sqlx-mysql, which sqlx's `macros`
      # feature compiles for query-validation. This app uses Postgres + HS256
      # JWTs exclusively, so no RSA decryption path is ever reached at runtime.
      # Revisit when an rsa fix ships or sqlx stops pulling unused drivers.
      - run: cargo audit --ignore RUSTSEC-2023-0071
